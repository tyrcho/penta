  <path d="M138,160 L262,160 L262,166 Q262,168 258,168 L142,168 Q138,168 138,166 Z" fill="#5c3a1e" opacity="0.4"/>
  <path d="M140,152 L260,152 L260,156 L140,156 Z" fill="#c99a5b" opacity="0.4"/>

