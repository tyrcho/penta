<svg id="art" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="beaconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe8" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#fde68a" stop-opacity="0.65"/>
      <stop offset="70%" stop-color="#fde68a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glassGrad" cx="38%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fffbe8"/>
      <stop offset="55%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#eab838"/>
    </radialGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="200" cy="378" rx="112" ry="15" fill="#000000" opacity="0.18"/>

  <!-- dirt mound -->
  <path d="M78,362 Q80,338 130,344 Q152,328 200,331 Q248,328 270,344 Q320,338 322,362 Q324,381 296,382 L104,382 Q76,381 78,362 Z"
