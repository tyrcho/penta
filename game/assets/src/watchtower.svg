  <rect x="154" y="120" width="8" height="32" rx="3" fill="#9a6a3c" stroke="#2b1809" stroke-width="5"/>
  <rect x="176" y="120" width="8" height="32" rx="3" fill="#9a6a3c" stroke="#2b1809" stroke-width="5"/>
  <rect x="198" y="120" width="8" height="32" rx="3" fill="#9a6a3c" stroke="#2b1809" stroke-width="5"/>
  <rect x="220" y="120" width="8" height="32" rx="3" fill="#9a6a3c" stroke="#2b1809" stroke-width="5"/>
  <rect x="242" y="120" width="8" height="32" rx="3" fill="#9a6a3c" stroke="#2b1809" stroke-width="5"/>
  <rect x="146" y="110" width="108" height="13" rx="5" fill="#9a6a3c" stroke="#2b1809" stroke-width="6"/>
  <rect x="148" y="111" width="104" height="4" fill="#c99a5b" opacity="0.5"/>

  <!-- light rays -->
  <path d="M226,76 L295,85 L226,94 Z" fill="#fde68a" opacity="0.45"/>
  <path d="M174,94 L105,85 L174,76 Z" fill="#fde68a" opacity="0.45"/>
  <path d="M212,110 L242,127 L225,97 Z" fill="#fde68a" opacity="0.4"/>
  <path d="M175,97 L158,127 L188,110 Z" fill="#fde68a" opacity="0.4"/>
  <path d="M188,60 L158,43 L175,73 Z" fill="#fde68a" opacity="0.35"/>
  <path d="M225,73 L242,43 L212,60 Z" fill="#fde68a" opacity="0.35"/>

  <!-- lantern housing -->
  <rect x="156" y="58" width="88" height="56" rx="10" fill="#caa24a" stroke="#2b1809" stroke-width="7"/>
  <rect x="168" y="67" width="64" height="40" rx="4" fill="url(#glassGrad)" stroke="#8a611c" stroke-width="3"/>
  <line x1="200" y1="67" x2="200" y2="107" stroke="#8a611c" stroke-width="3"/>
  <line x1="168" y1="87" x2="232" y2="87" stroke="#8a611c" stroke-width="3"/>
  <path d="M160,60 L176,60 L166,112 L156,112 Z" fill="#e8c987" opacity="0.4"/>
  <path d="M224,60 L240,60 L240,112 L228,112 Z" fill="#8a611c" opacity="0.35"/>

  <!-- roof -->
  <path d="M200,26 L252,58 L148,58 Z" fill="#7a4f28" stroke="#2b1809" stroke-width="7" stroke-linejoin="round"/>
  <path d="M200,26 L228,58 L252,58 Z" fill="#5c3a1e" opacity="0.5"/>
  <path d="M200,26 L172,58 L148,58 Z" fill="#c99a5b" opacity="0.45"/>

  <!-- finial -->
  <circle cx="200" cy="22" r="9" fill="#fde68a" stroke="#2b1809" stroke-width="5"/>
  <circle cx="197" cy="19" r="2.5" fill="#fffbe8"/>
</svg>
