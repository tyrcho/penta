  <path d="M100,341 L300,341 L300,350 Q300,354 296,354 L104,354 Q100,354 100,350 Z" fill="#5c3a1e" opacity="0.4"/>
  <path d="M101,324 L299,324 L299,331 L101,331 Z" fill="#c99a5b" opacity="0.4"/>

  <!-- legs -->
  <path d="M116,330 L156,330 L182,166 L160,166 Z" fill="#9a6a3c" stroke="#2b1809" stroke-width="7" stroke-linejoin="round"/>
  <path d="M284,330 L244,330 L218,166 L240,166 Z" fill="#9a6a3c" stroke="#2b1809" stroke-width="7" stroke-linejoin="round"/>
  <path d="M116,330 L128,330 L163,166 L160,166 Z" fill="#c99a5b" opacity="0.45"/>
  <path d="M244,330 L253,330 L227,166 L218,166 Z" fill="#5c3a1e" opacity="0.45"/>

  <!-- criss-cross bracing -->
  <line x1="157" y1="322" x2="232" y2="250" stroke="#2b1809" stroke-width="15" stroke-linecap="round"/>
  <line x1="157" y1="322" x2="232" y2="250" stroke="#7a4f28" stroke-width="9" stroke-linecap="round"/>
  <line x1="243" y1="322" x2="168" y2="250" stroke="#2b1809" stroke-width="15" stroke-linecap="round"/>
  <line x1="243" y1="322" x2="168" y2="250" stroke="#7a4f28" stroke-width="9" stroke-linecap="round"/>
  <line x1="169" y1="252" x2="221" y2="182" stroke="#2b1809" stroke-width="13" stroke-linecap="round"/>
  <line x1="169" y1="252" x2="221" y2="182" stroke="#7a4f28" stroke-width="8" stroke-linecap="round"/>
  <line x1="231" y1="252" x2="179" y2="182" stroke="#2b1809" stroke-width="13" stroke-linecap="round"/>
  <line x1="231" y1="252" x2="179" y2="182" stroke="#7a4f28" stroke-width="8" stroke-linecap="round"/>

