  <path d="M100,367 Q200,379 300,367 Q300,382 294,382 L106,382 Q100,381 100,367 Z" fill="#48301a" opacity="0.5"/>
  <path d="M96,349 Q122,334 162,336 Q142,347 120,360 Q100,359 96,349 Z" fill="#8d6844" opacity="0.5"/>

  <!-- beacon glow, behind everything above the mound -->
  <circle cx="200" cy="88" r="130" fill="url(#beaconGlow)"/>

  <!-- base beam -->
  <path d="M94,330 Q94,321 104,321 L296,321 Q306,321 306,330 L306,347 Q306,356 296,356 L104,356 Q94,356 94,347 Z"
