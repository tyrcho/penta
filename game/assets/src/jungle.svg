           Q260,354 282,358 Q262,340 244,318 Z"
        fill="#8A5A38" stroke="#402C18" stroke-width="6" stroke-linejoin="round"/>

  <!-- trunk (upper part tucks behind the canopy; face sits in the visible lower band) -->
