    <path d="M70,278 Q56,276 52,288 Q64,294 74,284 Z"/>
    <path d="M60,310 Q46,308 44,320 Q56,326 66,316 Z"/>
    <path d="M334,240 Q346,234 352,244 Q344,252 332,248 Z"/>
    <path d="M330,276 Q344,274 348,286 Q336,292 326,282 Z"/>
    <path d="M340,308 Q354,306 356,318 Q344,324 334,314 Z"/>
  </g>

