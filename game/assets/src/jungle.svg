  <g stroke="#402C18" stroke-width="3.2" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M184,238 Q180,264 184,284"/>
    <path d="M202,234 Q200,262 204,288"/>
    <path d="M218,240 Q222,264 218,284"/>
  </g>

  <!-- hidden Ent face in the lower bark: faint knot-hole eyes, camouflaged in trunk tones -->
  <g fill="#241505" opacity="0.32">
    <ellipse cx="183" cy="303" rx="4.5" ry="6.5"/>
    <ellipse cx="213" cy="303" rx="4.5" ry="6.5"/>
  </g>
  <path d="M180,322 Q198,326 216,322" stroke="#241505" stroke-width="2.6" fill="none"
        stroke-linecap="round" opacity="0.3"/>

  <!-- hanging vines with small leaves either side of the canopy -->
  <g fill="none" stroke="#17331F" stroke-width="5" stroke-linecap="round">
    <path d="M78,214 Q56,244 66,276 Q74,300 56,322"/>
    <path d="M322,214 Q346,242 336,274 Q328,300 348,324"/>
  </g>
  <g fill="#6FAE4A" stroke="#17331F" stroke-width="3.5" stroke-linejoin="round">
