    <path fill="#4B9351" d="M365.8,190.0 Q358.3,203.1 362.8,220.5 Q346.7,228.4 338.3,243.5 Q318.3,238.1 304.0,245.7 Q290.4,235.6 270.1,242.8 Q261.9,227.9 245.3,220.5 Q246.3,203.9 242.8,190.0 Q252.1,177.5 245.2,159.5 Q265.2,155.1 270.1,137.1 Q288.7,138.6 304.0,133.6 Q318.6,141.0 337.5,137.9 Q341.4,156.4 362.0,159.9 Q357.8,177.0 365.8,190.0 Z"/>
