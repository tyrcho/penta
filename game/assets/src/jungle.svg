      <ellipse cx="200" cy="262" rx="40" ry="30"/>
      <ellipse cx="60" cy="170" rx="30" ry="34"/>
      <ellipse cx="340" cy="170" rx="30" ry="34"/>
    </g>
    <!-- lighter green cluster toward the top-left, catching the light -->
