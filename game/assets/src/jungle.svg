    <ellipse cx="320" cy="352" rx="3.8" ry="4.8" transform="rotate(24 320 352)"/>
  </g>

  <!-- roots flaring into the ground -->
  <path d="M160,318 Q142,340 118,358 Q140,354 162,342 Q166,358 158,376 Q182,364 184,340
