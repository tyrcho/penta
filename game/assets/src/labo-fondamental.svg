<svg id="art" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bodyGrad" x1="0.15" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0%" stop-color="#eef6f7"/>
      <stop offset="45%" stop-color="#cfe0e2"/>
      <stop offset="100%" stop-color="#93aaad"/>
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0.2" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#bcdbdd"/>
      <stop offset="55%" stop-color="#8fb3b6"/>
      <stop offset="100%" stop-color="#5e7c7f"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e4e8ea"/>
      <stop offset="50%" stop-color="#b9c2c6"/>
      <stop offset="100%" stop-color="#828e93"/>
    </linearGradient>
    <linearGradient id="corkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbab7c"/>
      <stop offset="100%" stop-color="#93724a"/>
    </linearGradient>
  </defs>

  <!-- soft ground shadow -->
  <ellipse cx="200" cy="357" rx="95" ry="16" fill="#1c2426" opacity="0.18"/>

  <!-- side ornament swirls (plain, unadorned metal - no rope/vine texture like the specialized labs) -->
  <path d="M 92 222 Q 55 218 52 240 Q 50 258 68 260 Q 56 258 58 244 Q 60 228 92 232 Z"
        fill="url(#metalGrad)" stroke="#2e3a3d" stroke-width="5" stroke-linejoin="round"/>
  <path d="M 308 222 Q 345 218 348 240 Q 350 258 332 260 Q 344 258 342 244 Q 340 228 308 232 Z"
        fill="url(#metalGrad)" stroke="#2e3a3d" stroke-width="5" stroke-linejoin="round"/>

  <!-- bottle body: rounded shoulders tapering to a soft faceted point, echoing the sibling bottles -->
  <path d="M 200 158
           C 150 158 118 176 100 218
           C 84 254 88 296 112 328
           C 140 364 200 356 200 356
           C 200 356 260 364 288 328
           C 312 296 316 254 300 218
           C 282 176 250 158 200 158 Z"
        fill="url(#bodyGrad)" stroke="#2e3a3d" stroke-width="7" stroke-linejoin="round"/>

  <!-- neck -->
  <path d="M 178 96 L 178 168 Q 178 176 186 176 L 214 176 Q 222 176 222 168 L 222 96 Z"
        fill="url(#bodyGrad)" stroke="#2e3a3d" stroke-width="7" stroke-linejoin="round"/>

  <!-- collar ring where neck meets shoulder -->
  <rect x="172" y="160" width="56" height="14" rx="6" fill="url(#metalGrad)" stroke="#2e3a3d" stroke-width="5"/>

  <!-- cork stopper -->
  <path d="M 172 46 Q 172 34 200 34 Q 228 34 228 46 L 226 96 L 174 96 Z"
        fill="url(#corkGrad)" stroke="#2e3a3d" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 176 60 L 224 60 M 175 76 L 225 76" stroke="#7a5c38" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <ellipse cx="188" cy="44" rx="10" ry="5" fill="#e8d3ab" opacity="0.7"/>

  <!-- liquid fill inside the lower body -->
  <path d="M 108 240 C 100 272 106 304 128 326 C 152 350 200 344 200 344 C 200 344 248 350 272 326 C 294 304 300 272 292 240
           C 268 258 234 268 200 268 C 166 268 132 258 108 240 Z"
        fill="url(#liquidGrad)" opacity="0.92"/>

  <!-- decorative band wrapping the midsection: plain, unengraved - this lab hasn't specialized yet -->
  <path d="M 92 232 Q 200 208 308 232 L 300 254 Q 200 232 100 254 Z"
        fill="url(#metalGrad)" stroke="#2e3a3d" stroke-width="6" stroke-linejoin="round"/>

  <!-- empty medallion frame at center front: blank bezel, no gem set (no research line chosen yet) -->
  <path d="M 200 214 L 224 240 L 200 268 L 176 240 Z"
        fill="#a9b6ba" stroke="#2e3a3d" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 200 224 L 214 240 L 200 258 L 186 240 Z"
        fill="#7f9296" opacity="0.85"/>

  <!-- glossy highlight streak -->
  <path d="M 138 186 Q 128 250 148 316 Q 132 254 148 190 Z" fill="#ffffff" opacity="0.55"/>
  <ellipse cx="188" cy="112" rx="8" ry="26" fill="#ffffff" opacity="0.35"/>

  <!-- shadow overlay at base -->
  <path d="M 112 300 C 132 336 200 340 200 340 C 200 340 268 336 288 300 C 268 322 234 332 200 332 C 166 332 132 322 112 300 Z"
        fill="#2e4144" opacity="0.28"/>
</svg>
