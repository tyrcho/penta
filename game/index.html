<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tower defense POC — ScalaJS + PixiJS v8.">
  <title>tower-defense-poc</title>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.6.0/dist/pixi.min.js"
          integrity="sha384-WgaQEQzzPID7Pm7lYsOUogCUPFybLCtoH+DjLfzzH3xQBvJAAul6CNqfWEdbtC6u"
          crossorigin="anonymous"
          defer></script>
  <style>
    :root {
      --color-brand:   #7c3aed;
      --color-bg:      #1a1a2e;
      --color-surface: #16213e;
      --color-text:    #e8e8e8;
      --color-border:  #2a2a4a;
      --color-gold:    #eab308;
      --color-fire:     #fb923c;
      --color-light:    #fde68a;
      --color-shadow:   #c4b5fd;
      --color-crystal:  #22d3ee;
      --color-progress: #38bdf8;
      --color-ai:      #a78bfa;
      --color-lost:    #f87171;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; touch-action: pinch-zoom; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      display: flex;
      flex-direction: column;
    }
    #controlbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1rem;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
      z-index: 1;
    }
    #controlbar h1 { font-size: 1rem; font-weight: 700; color: var(--color-brand); }
    #controlbar .spacer { flex: 1; }
    .panel { display: flex; align-items: center; gap: 0.6rem; }
    .speed-btn {
      padding: 0.3rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-bg);
      color: var(--color-text);
      cursor: pointer;
    }
    .build-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.4rem;
      height: 2.4rem;
      padding: 0.2rem;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-bg);
      cursor: pointer;
    }
    .build-btn img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    .build-btn:hover { border-color: var(--color-brand); background: var(--color-surface); }
    .build-btn.selected { background: var(--color-brand); border-color: var(--color-brand); }
    .build-btn.selected:hover { background: var(--color-brand); border-color: var(--color-brand); }
    .build-btn.disabled { opacity: 0.35; cursor: not-allowed; }
    .build-btn.disabled:hover { border-color: var(--color-border); background: var(--color-bg); }
    #speed-label { font-size: 0.85rem; font-weight: 700; min-width: 2.5rem; text-align: center; }
    #new-game-btn { display: none; }
    #new-game-btn.visible { display: inline-block; }
    /* Attract-mode duel (see GameApp's Mode.Spectating/updateModeUi): two random ladder
       AIs play each other until a human hits "Play" (the #new-game-btn, relabeled). While
       it runs, the player-only controls (build toolbar, destroy/upgrade, the difficulty
       picker) have nothing to act on, so they're hidden rather than just disabled — this
       is also most of the "too much chrome" fix on mobile, since it's the biggest chunk of
       the header/build UI. */
    #spectate-label { display: none; font-size: 0.85rem; font-weight: 700; color: var(--color-ai); }
    body.mode-spectating #ai-level-panel { display: none; }
    body.mode-spectating #spectate-label { display: inline-block; }
    body.mode-spectating .build-btn,
    body.mode-spectating .build-slot-placeholder { display: none; }
    /* Concept rows: one per faction (Nature/Chaos/Loi/Mort/Science), each showing that
       faction's resource+rate, victory progress, and building slots (real ones filled,
       the rest left as explicit placeholders when a faction has fewer than 5 buildings) —
       replaces the old build-button bar + stats row, which grouped by kind of info
       (all resources together, all buttons together) rather than by faction. Science's
       progress shows readyLabCount/4 other labs at the depth its own current fondamentale
       level demands (see VictoryConditions.fondamentaleReadyLabCount) — Loi's "Paix
       Eternelle" (win by building count at a turn-count deadline) has no such deadline
       concept in this real-time game yet, so its row still shows a bare "—".
       Faction/resource/progress names are single emoji, not words (title= carries the
       full name for anyone hovering with a mouse) — the actual goal is vertical, not
       horizontal: on a narrow phone a wordy row (e.g. "Corrupted: 0/8" next to "Shadow:
       15 (+0.22/s)") wraps onto two lines, and it's that wrapping — not the row's raw
       width — that was eating the vertical space the maze canvas needed to render at a
       readable cell size. Shrinking words to icons is what keeps every row to one line. */
    #concept-rows {
      display: flex;
      flex-direction: column;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
      z-index: 1;
    }
    .concept-row {
      display: grid;
      grid-template-columns: 1.6rem 1fr auto 1fr;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.75rem;
      border-top: 1px solid var(--color-border);
    }
    .concept-row:first-child { border-top: none; }
    .concept-name { font-size: 1.2rem; line-height: 1; text-align: center; }
    .concept-side { display: flex; align-items: center; gap: 0.5rem; flex-wrap: nowrap; }
    .concept-side.ai-side { justify-content: flex-end; }
    .concept-buildings { display: flex; align-items: center; gap: 0.4rem; }
    .build-slot-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.4rem;
      height: 2.4rem;
      border: 1px dashed var(--color-border);
      border-radius: 6px;
      color: var(--color-border);
      font-size: 0.9rem;
    }
    .stat { display: inline-flex; align-items: center; gap: 0.15rem; font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
    .stat.wood { color: var(--color-gold); }
    .stat.fire { color: var(--color-fire); }
    .stat.light { color: var(--color-light); }
    .stat.shadow { color: var(--color-shadow); }
    .stat.crystal { color: var(--color-crystal); }
    .stat.progress { color: var(--color-progress); }
    .stat.unknown { color: var(--color-border); font-style: italic; font-weight: 500; }
    .stat .rate { font-size: 0.7rem; font-weight: 500; opacity: 0.75; }
    .progress-bar {
      display: inline-block;
      width: 3rem;
      height: 0.4rem;
      margin-left: 0.15rem;
      background: var(--color-border);
      border-radius: 3px;
      overflow: hidden;
      vertical-align: middle;
    }
    .progress-bar-fill {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--color-progress);
      transition: width 0.2s ease-out;
    }
    #game-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #game-container canvas {
      display: block;
      /* pinch-zoom (not none) — a single-finger tap/drag still stays fully custom (no
         native pan), but a pinch gesture is no longer swallowed, so mobile players can
         zoom in on the maze same as everywhere else on the page. */
      touch-action: pinch-zoom;
    }
    /* One banner per maze half, each dimming only its own side, so the loser's half
       doesn't visually claim the winner's. left/top/width/height are set inline by
       GameApp.updateGameOverBoxes (computed the same way the mazes themselves are
       positioned/scaled), not by CSS — a static 50/50 split stopped being correct once
       the AI's maze could render smaller than the player's (see aiScaleFor's doc).
       pointer-events: none keeps the underlying canvas (and its buildings) hoverable
       straight through the banner. */
    .game-over-side {
      display: none;
      position: absolute;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      background: rgba(15, 23, 42, 0.55);
      pointer-events: none;
      z-index: 2;
    }
    .game-over-side.visible { display: flex; }
    .game-over-title { font-size: 2rem; font-weight: 800; }
    .game-over-title.won { color: var(--color-brand); }
    .game-over-title.lost { color: var(--color-lost); }
    .game-over-reason { font-size: 1rem; color: var(--color-text); }
    #tooltip {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: auto;
      bottom: auto;
      max-width: 260px;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      padding: 0.4rem 0.6rem;
      font-size: 0.8rem;
      line-height: 1.3;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      pointer-events: none;
      z-index: 3;
    }
    #tooltip.visible { display: block; }
    #tooltip-destroy {
      display: none;
      margin-top: 0.4rem;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-bg);
      color: var(--color-text);
      cursor: pointer;
      pointer-events: auto;
    }
    #tooltip-destroy.visible { display: inline-block; }
    #tooltip-destroy:hover { border-color: var(--color-brand); background: var(--color-surface); }
    /* Up to 5 slots (BuildingSpecs.upgradeOptions' longest branch — LaboFondamental's 5
       specific labs); Grove/Forest's single-option chain only ever shows slot 0. Each is a
       (preview, button) pair, same look as the old single #tooltip-upgrade/-preview pair
       this replaces — just addressed by a shared class instead of one fixed id, so
       GameApp.scala can show/hide/wire as many as the selected building actually has. */
    .tooltip-upgrade-btn {
      display: none;
      margin-top: 0.4rem;
      margin-left: 0.3rem;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--color-brand);
      border-radius: 4px;
      background: var(--color-bg);
      color: var(--color-text);
      cursor: pointer;
      pointer-events: auto;
    }
    .tooltip-upgrade-btn.visible { display: inline-block; }
    .tooltip-upgrade-btn:hover { background: var(--color-brand); }
    .tooltip-upgrade-btn.disabled { opacity: 0.35; cursor: not-allowed; }
    .tooltip-upgrade-btn.disabled:hover { background: var(--color-bg); }
    .tooltip-upgrade-preview {
      display: none;
      margin-top: 0.3rem;
      font-size: 0.7rem;
      color: var(--color-brand);
      opacity: 0.85;
    }
    .tooltip-upgrade-preview.visible { display: block; }
    #tooltip-research {
      display: none;
      margin-top: 0.4rem;
      margin-left: 0.3rem;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--color-crystal);
      border-radius: 4px;
      background: var(--color-bg);
      color: var(--color-text);
      cursor: pointer;
      pointer-events: auto;
    }
    #tooltip-research.visible { display: inline-block; }
    #tooltip-research:hover { background: var(--color-crystal); color: var(--color-bg); }
    #tooltip-research.disabled { opacity: 0.35; cursor: not-allowed; }
    #tooltip-research.disabled:hover { background: var(--color-bg); color: var(--color-text); }
    /* Phones (mostly portrait, mostly narrow): the maze is the whole point of the page,
       so the chrome above it — controlbar + the 5 concept-rows — needs to stay as thin
       as possible. Every row's 5 "?" build-slot filler carries no gameplay info at any
       width, so it's the first thing dropped; the AI-strategy picker (a long name like
       "14. resource-maze@5s") is capped with an ellipsis rather than left free to force
       a wrap; button/text sizes then shrink to match. Desktop/tablet keep the full
       layout untouched. */
    @media (max-width: 700px) {
      #controlbar { padding: 0.3rem 0.5rem; gap: 0.4rem; }
      #controlbar h1 { font-size: 0.8rem; }
      .panel { gap: 0.35rem; }
      .speed-btn { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
      #ai-level-select { max-width: 7.5rem; text-overflow: ellipsis; }
      #speed-label { min-width: 1.8rem; font-size: 0.75rem; }
      #spectate-label { font-size: 0.75rem; }
      .build-slot-placeholder { display: none; }
      .concept-row {
        grid-template-columns: 1.3rem 1fr auto 1fr;
        gap: 0.3rem;
        padding: 0.2rem 0.4rem;
      }
      .concept-name { font-size: 1rem; }
      .build-btn { width: 1.8rem; height: 1.8rem; }
      .stat { font-size: 0.72rem; gap: 0.1rem; }
      .stat .rate { font-size: 0.62rem; }
      .progress-bar { width: 1.8rem; margin-left: 0.1rem; }
    }
  </style>
</head>
<body>
  <header id="controlbar">
    <h1>tower-defense-poc</h1>
    <span class="spacer"></span>
    <div class="panel" id="ai-level-panel">
      <label for="ai-level-select" id="ai-label" style="font-size: 0.85rem; font-weight: 600;">AI:</label>
      <select class="speed-btn" id="ai-level-select"></select>
    </div>
    <span id="spectate-label"></span>
    <div class="panel">
      <button class="speed-btn" id="slow-btn">−</button>
      <button class="speed-btn" id="pause-btn">Pause</button>
      <button class="speed-btn" id="fast-btn">+</button>
      <span id="speed-label">1x</span>
      <button class="speed-btn" id="new-game-btn">New Game</button>
      <button class="speed-btn" id="fullscreen-btn">Full</button>
      <button class="speed-btn" id="lang-btn">EN</button>
    </div>
  </header>
  <div id="concept-rows">
    <div class="concept-row">
      <span class="concept-name" data-i18n="nature" title="Nature">🌳</span>
      <div class="concept-side player-side">
        <span class="stat wood" data-i18n="wood" title="Wood">🪵<span id="player-wood">0</span><span class="rate" id="player-wood-rate"></span></span>
        <span class="stat progress" data-i18n="forests" title="Forests">🌲<span id="player-forests">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="player-forests-bar"></span></span></span>
      </div>
      <div class="concept-buildings">
        <button class="build-btn selected" id="build-grove"><img src="./assets/grove.png" alt="Bosquet" data-i18n-alt="grove"></button>
        <button class="build-btn" id="build-stonehenge"><img src="./assets/stonehenge.png" alt="Stonehenge" data-i18n-alt="stonehenge"></button>
        <span class="build-slot-placeholder">?</span>
        <span class="build-slot-placeholder">?</span>
        <span class="build-slot-placeholder">?</span>
      </div>
      <div class="concept-side ai-side">
        <span class="stat progress" data-i18n="forests" title="Forests">🌲<span id="ai-forests">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="ai-forests-bar"></span></span></span>
        <span class="stat wood" data-i18n="wood" title="Wood">🪵<span id="ai-wood">0</span><span class="rate" id="ai-wood-rate"></span></span>
      </div>
    </div>
    <div class="concept-row">
      <span class="concept-name" data-i18n="chaos" title="Chaos">👹</span>
      <div class="concept-side player-side">
        <span class="stat fire" data-i18n="fire" title="Fire">🔥<span id="player-fire">0</span><span class="rate" id="player-fire-rate"></span></span>
        <span class="stat progress" data-i18n="plundered" title="Plundered">💰<span id="player-plundered">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="player-plundered-bar"></span></span></span>
      </div>
      <div class="concept-buildings">
        <button class="build-btn" id="build-cave"><img src="./assets/cave.png" alt="Cave" data-i18n-alt="cave"></button>
        <button class="build-btn" id="build-labyrinthe"><img src="./assets/labyrinthe.png" alt="Labyrinthe" data-i18n-alt="labyrinth"></button>
        <span class="build-slot-placeholder">?</span>
        <span class="build-slot-placeholder">?</span>
        <span class="build-slot-placeholder">?</span>
      </div>
      <div class="concept-side ai-side">
        <span class="stat progress" data-i18n="plundered" title="Plundered">💰<span id="ai-plundered">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="ai-plundered-bar"></span></span></span>
        <span class="stat fire" data-i18n="fire" title="Fire">🔥<span id="ai-fire">0</span><span class="rate" id="ai-fire-rate"></span></span>
      </div>
    </div>
    <div class="concept-row">
      <span class="concept-name" data-i18n="loi" title="Loi">⚖️</span>
      <div class="concept-side player-side">
        <span class="stat light" data-i18n="light" title="Light">💡<span id="player-light">0</span><span class="rate" id="player-light-rate"></span></span>
        <!-- Eglise/Watchtower feed no VictoryConditions target today — placeholder until one exists. -->
        <span class="stat unknown" data-i18n="victory" title="Victory">🏆 —</span>
      </div>
      <div class="concept-buildings">
        <button class="build-btn" id="build-eglise"><img src="./assets/eglise.png" alt="Eglise" data-i18n-alt="church"></button>
        <button class="build-btn" id="build-watchtower"><img src="./assets/watchtower.png" alt="Tour de guet" data-i18n-alt="watchtower"></button>
        <button class="build-btn" id="build-angel"><img src="./assets/angel.png" alt="Ange" data-i18n-alt="angel"></button>
        <span class="build-slot-placeholder">?</span>
        <span class="build-slot-placeholder">?</span>
      </div>
      <div class="concept-side ai-side">
        <span class="stat unknown" data-i18n="victory" title="Victory">🏆 —</span>
        <span class="stat light" data-i18n="light" title="Light">💡<span id="ai-light">0</span><span class="rate" id="ai-light-rate"></span></span>
      </div>
    </div>
    <div class="concept-row">
      <span class="concept-name" data-i18n="mort" title="Mort">💀</span>
      <div class="concept-side player-side">
        <span class="stat shadow" data-i18n="shadow" title="Shadow">🌑<span id="player-shadow">0</span><span class="rate" id="player-shadow-rate"></span></span>
        <span class="stat progress" data-i18n="corrupted" title="Corrupted">☠️<span id="player-corrupted">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="player-corrupted-bar"></span></span></span>
      </div>
      <div class="concept-buildings">
        <button class="build-btn" id="build-tomb"><img src="./assets/tomb.png" alt="Tombe" data-i18n-alt="tomb"></button>
        <button class="build-btn" id="build-chateau-noir"><img src="./assets/chateau-noir.png" alt="Chateau Noir" data-i18n-alt="blackCastle"></button>
        <button class="build-btn" id="build-death-house"><img src="./assets/death-house.png" alt="Maison de la Mort" data-i18n-alt="deathHouse"></button>
        <button class="build-btn" id="build-passing-gate"><img src="./assets/passing-gate.png" alt="Portail" data-i18n-alt="passingGate"></button>
        <span class="build-slot-placeholder">?</span>
      </div>
      <div class="concept-side ai-side">
        <span class="stat progress" data-i18n="corrupted" title="Corrupted">☠️<span id="ai-corrupted">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="ai-corrupted-bar"></span></span></span>
        <span class="stat shadow" data-i18n="shadow" title="Shadow">🌑<span id="ai-shadow">0</span><span class="rate" id="ai-shadow-rate"></span></span>
      </div>
    </div>
    <div class="concept-row">
      <span class="concept-name" data-i18n="science" title="Science">🧪</span>
      <div class="concept-side player-side">
        <span class="stat crystal" data-i18n="crystal" title="Crystal">💎<span id="player-crystal">0</span><span class="rate" id="player-crystal-rate"></span></span>
        <span class="stat progress" data-i18n="fondamentale" title="Fondamentale">🔬<span id="player-fondamentale">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="player-fondamentale-bar"></span></span></span>
      </div>
      <div class="concept-buildings">
        <!-- The only Science build button — LaboNaturel/Sombre/DeRecherche/DeLaLoi/DuChaos
             are reached by upgrading this one, chosen via the tooltip's 5 upgrade buttons
             (see index.html's #tooltip-upgrade-0..4), never built directly. -->
        <button class="build-btn" id="build-labo-fondamental"><img src="./assets/labo-fondamental.png" alt="Labo Fondamental" data-i18n-alt="laboFondamental"></button>
        <span class="build-slot-placeholder">?</span>
        <span class="build-slot-placeholder">?</span>
        <span class="build-slot-placeholder">?</span>
        <span class="build-slot-placeholder">?</span>
      </div>
      <div class="concept-side ai-side">
        <span class="stat progress" data-i18n="fondamentale" title="Fondamentale">🔬<span id="ai-fondamentale">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="ai-fondamentale-bar"></span></span></span>
        <span class="stat crystal" data-i18n="crystal" title="Crystal">💎<span id="ai-crystal">0</span><span class="rate" id="ai-crystal-rate"></span></span>
      </div>
    </div>
  </div>
  <main id="game-container">
    <div id="game-over-player" class="game-over-side">
      <div id="game-over-player-title" class="game-over-title"></div>
      <div id="game-over-player-reason" class="game-over-reason"></div>
    </div>
    <div id="game-over-ai" class="game-over-side">
      <div id="game-over-ai-title" class="game-over-title"></div>
      <div id="game-over-ai-reason" class="game-over-reason"></div>
    </div>
    <div id="tooltip">
      <span id="tooltip-text"></span>
      <span id="tooltip-upgrade-preview-0" class="tooltip-upgrade-preview"></span>
      <button id="tooltip-upgrade-0" class="tooltip-upgrade-btn"></button>
      <span id="tooltip-upgrade-preview-1" class="tooltip-upgrade-preview"></span>
      <button id="tooltip-upgrade-1" class="tooltip-upgrade-btn"></button>
      <span id="tooltip-upgrade-preview-2" class="tooltip-upgrade-preview"></span>
      <button id="tooltip-upgrade-2" class="tooltip-upgrade-btn"></button>
      <span id="tooltip-upgrade-preview-3" class="tooltip-upgrade-preview"></span>
      <button id="tooltip-upgrade-3" class="tooltip-upgrade-btn"></button>
      <span id="tooltip-upgrade-preview-4" class="tooltip-upgrade-preview"></span>
      <button id="tooltip-upgrade-4" class="tooltip-upgrade-btn"></button>
      <button id="tooltip-research"></button>
      <button id="tooltip-destroy"></button>
    </div>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
