<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Tower defense POC — ScalaJS + PixiJS v8.">
  <title>tower-defense-poc</title>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.6.0/dist/pixi.min.js"
          integrity="sha384-WgaQEQzzPID7Pm7lYsOUogCUPFybLCtoH+DjLfzzH3xQBvJAAul6CNqfWEdbtC6u"
          crossorigin="anonymous"
          defer></script>
  <style>
    :root {
      --color-brand:   #7c3aed;
      --color-bg:      #1a1a2e;
      --color-surface: #16213e;
      --color-text:    #e8e8e8;
      --color-border:  #2a2a4a;
      --color-gold:    #eab308;
      --color-fire:     #fb923c;
      --color-light:    #fde68a;
      --color-progress: #38bdf8;
      --color-ai:      #a78bfa;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; touch-action: none; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      display: flex;
      flex-direction: column;
    }
    #controlbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1rem;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
      z-index: 1;
    }
    #controlbar h1 { font-size: 1rem; font-weight: 700; color: var(--color-brand); }
    #controlbar .spacer { flex: 1; }
    .panel { display: flex; align-items: center; gap: 0.6rem; }
    .speed-btn {
      padding: 0.3rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-bg);
      color: var(--color-text);
      cursor: pointer;
    }
    .build-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.4rem;
      height: 2.4rem;
      padding: 0.2rem;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-bg);
      cursor: pointer;
    }
    .build-btn img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    .build-btn:hover { border-color: var(--color-brand); background: var(--color-surface); }
    .build-btn.selected { background: var(--color-brand); border-color: var(--color-brand); }
    .build-btn.selected:hover { background: var(--color-brand); border-color: var(--color-brand); }
    .build-btn#build-cave img { filter: sepia(1) saturate(4) hue-rotate(-40deg) brightness(1.1); }
    .build-btn.disabled { opacity: 0.35; cursor: not-allowed; }
    .build-btn.disabled:hover { border-color: var(--color-border); background: var(--color-bg); }
    #speed-label { font-size: 0.85rem; font-weight: 700; min-width: 2.5rem; text-align: center; }
    #new-game-btn { display: none; }
    #new-game-btn.visible { display: inline-block; }
    #stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 0.4rem 1rem;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
      z-index: 1;
    }
    .maze-panel { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .maze-panel.ai-side { justify-content: flex-end; }
    .stat { font-size: 0.9rem; font-weight: 600; }
    .stat.wood { color: var(--color-gold); }
    .stat.fire { color: var(--color-fire); }
    .stat.light { color: var(--color-light); }
    .stat.progress { color: var(--color-progress); }
    .progress-bar {
      display: inline-block;
      width: 4rem;
      height: 0.4rem;
      margin-left: 0.4rem;
      background: var(--color-border);
      border-radius: 3px;
      overflow: hidden;
      vertical-align: middle;
    }
    .progress-bar-fill {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--color-progress);
      transition: width 0.2s ease-out;
    }
    .player-label { font-size: 0.85rem; font-weight: 700; color: var(--color-text); }
    .player-label.ai { color: var(--color-ai); }
    #game-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #game-container canvas {
      display: block;
      touch-action: none;
    }
    #game-over {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      background: rgba(15, 23, 42, 0.85);
      z-index: 2;
    }
    #game-over.visible { display: flex; }
    #game-over-title { font-size: 2rem; font-weight: 800; color: var(--color-brand); }
    #game-over-reason { font-size: 1rem; color: var(--color-text); }
    #tooltip {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      max-width: 260px;
      padding: 0.4rem 0.6rem;
      font-size: 0.8rem;
      line-height: 1.3;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      pointer-events: none;
      z-index: 3;
    }
    #tooltip.visible { display: block; }
  </style>
</head>
<body>
  <header id="controlbar">
    <h1>tower-defense-poc</h1>
    <div class="panel">
      <button class="build-btn selected" id="build-forest"><img src="./assets/forest.png" alt="Forêt"></button>
      <button class="build-btn" id="build-cave"><img src="./assets/cave.png" alt="Cave"></button>
      <button class="build-btn" id="build-labyrinthe"><img src="./assets/labyrinthe.png" alt="Labyrinthe"></button>
      <button class="build-btn" id="build-eglise"><img src="./assets/eglise.png" alt="Eglise"></button>
    </div>
    <span class="spacer"></span>
    <div class="panel">
      <button class="speed-btn" id="slow-btn">−</button>
      <button class="speed-btn" id="pause-btn">Pause</button>
      <button class="speed-btn" id="fast-btn">+</button>
      <span id="speed-label">1x</span>
      <button class="speed-btn" id="new-game-btn">New Game</button>
    </div>
  </header>
  <div id="stats-row">
    <div class="maze-panel player-side">
      <span class="player-label">You</span>
      <span class="stat wood">Wood: <span id="player-wood">0</span></span>
      <span class="stat fire">Fire: <span id="player-fire">0</span></span>
      <span class="stat light">Light: <span id="player-light">0</span></span>
      <span class="stat progress">Forests: <span id="player-forests">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="player-forests-bar"></span></span></span>
      <span class="stat progress">Plundered: <span id="player-plundered">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="player-plundered-bar"></span></span></span>
    </div>
    <div class="maze-panel ai-side">
      <span class="stat progress">Plundered: <span id="ai-plundered">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="ai-plundered-bar"></span></span></span>
      <span class="stat progress">Forests: <span id="ai-forests">0/0</span><span class="progress-bar"><span class="progress-bar-fill" id="ai-forests-bar"></span></span></span>
      <span class="stat light">Light: <span id="ai-light">0</span></span>
      <span class="stat fire">Fire: <span id="ai-fire">0</span></span>
      <span class="stat wood">Wood: <span id="ai-wood">0</span></span>
      <span class="player-label ai">AI</span>
    </div>
  </div>
  <main id="game-container">
    <div id="game-over">
      <div id="game-over-title"></div>
      <div id="game-over-reason"></div>
    </div>
    <div id="tooltip"></div>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
